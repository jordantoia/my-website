<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sa1nt — Private Vault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --orange: #D97A3A;
      --orange-dim: rgba(217, 122, 58, 0.18);
      --cream: #faf8f4;
      --cream-2: #f3f0e9;
      --ink: #1a1a1a;
      --dark: #0f0f0e;
      --dark-2: #151513;
      --dark-3: #1c1c1a;
      --muted-light: #888884;
      --muted-dark: rgba(255,255,255,0.35);
      --border-dark: rgba(255,255,255,0.07);
      --border-light: #dedad2;

      --font-display: 'Barlow Condensed', 'Arial Narrow', sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;

      --max-w: 1320px;
      --pad-x: clamp(20px, 4vw, 56px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ────────────────────────────────────────────
       GATE — passkey screen
    ──────────────────────────────────────────── */
    #gate {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #gate.hidden { opacity: 0; pointer-events: none; }

    .gate-glow {
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 50%, var(--orange-dim) 0%, transparent 55%);
      opacity: 0; animation: glowIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      pointer-events: none;
    }
    @keyframes glowIn { to { opacity: 1; } }

    .gate-inner {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      gap: 28px;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    .gate-logo img {
      height: 56px;
      filter: invert(1);
      opacity: 0.95;
    }
    .gate-eyebrow {
      font-size: 9.5px; font-weight: 600;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--orange);
    }
    .gate-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(48px, 8vw, 96px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      text-align: center;
    }
    .gate-rule {
      width: 80px; height: 1px; background: var(--orange);
      transform: scaleX(0); transform-origin: center;
      animation: lineExpandC 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }
    @keyframes lineExpandC { to { transform: scaleX(1); } }

    .gate-form {
      display: flex; gap: 0; margin-top: 8px;
      border: 1px solid var(--border-dark);
      transition: border-color 0.3s ease;
    }
    .gate-form:focus-within { border-color: var(--orange); }
    .gate-form.shake { animation: shake 0.45s; border-color: #c84a4a; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .gate-input {
      background: transparent; border: none; outline: none;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.4em;
      padding: 18px 22px;
      width: 260px;
    }
    .gate-input::placeholder { color: var(--muted-dark); letter-spacing: 0.3em; }
    .gate-submit {
      background: var(--orange);
      color: #fff; border: none;
      font-family: var(--font-body);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.3em; text-transform: uppercase;
      padding: 0 28px;
      transition: background 0.2s ease;
    }
    .gate-submit:hover { background: #e88a4a; }

    .gate-hint {
      font-size: 10px; color: var(--muted-dark);
      letter-spacing: 0.22em; text-transform: uppercase;
      margin-top: 4px;
    }

    /* ────────────────────────────────────────────
       NAV
    ──────────────────────────────────────────── */
    #nav {
      position: fixed; inset: 0 0 auto 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px var(--pad-x);
      transition: background 0.5s ease, border-color 0.5s ease, backdrop-filter 0.5s ease;
      border-bottom: 1px solid transparent;
    }
    #nav.scrolled {
      background: rgba(15, 15, 14, 0.86);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-color: var(--border-dark);
    }
    .nav-logo img { height: 44px; filter: invert(1); opacity: 0.95; }
    .nav-right {
      display: flex; align-items: center; gap: 28px;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted-dark);
    }
    .nav-filter {
      background: none; border: none;
      color: var(--muted-dark);
      font-family: inherit; font-size: inherit;
      letter-spacing: inherit; text-transform: inherit;
      padding: 4px 0;
      position: relative;
      transition: color 0.25s ease;
    }
    .nav-filter::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: var(--orange);
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nav-filter:hover, .nav-filter.active { color: var(--cream); }
    .nav-filter.active::after { width: 100%; }

    /* ────────────────────────────────────────────
       HERO
    ──────────────────────────────────────────── */
    .hero {
      padding: 200px var(--pad-x) 80px;
      max-width: var(--max-w); margin: 0 auto;
      position: relative;
    }
    .hero-eyebrow {
      font-size: 9.5px; font-weight: 600;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--orange);
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
      opacity: 0;
    }
    .hero-eyebrow::after {
      content: ''; width: 40px; height: 1px;
      background: var(--orange); opacity: 0.5;
    }
    .hero-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(64px, 11vw, 168px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    .hero-title .word {
      display: inline-block;
      overflow: hidden;
      vertical-align: top;
    }
    .hero-title .word > span {
      display: inline-block;
      transform: translateY(110%);
    }
    .hero-meta {
      display: flex; gap: 40px; align-items: flex-end;
      justify-content: space-between;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border-dark);
      flex-wrap: wrap;
      opacity: 0;
    }
    .hero-meta-left {
      font-size: 12px; color: rgba(255,255,255,0.55);
      line-height: 1.7; max-width: 460px;
    }
    .hero-meta-right {
      display: flex; gap: 28px;
      font-size: 10px; color: var(--muted-dark);
      letter-spacing: 0.22em; text-transform: uppercase;
    }
    .hero-meta-right span strong {
      display: block;
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: var(--cream); letter-spacing: 0.04em;
      margin-top: 4px;
    }

    /* run hero animations only after gate is unlocked */
    body.unlocked .hero-eyebrow { animation: fadeIn 0.8s ease 0.25s both; }
    body.unlocked .hero-title .word > span { animation: wordRise 1.1s cubic-bezier(0.16, 1, 0.3, 1) both; }
    body.unlocked .hero-meta { animation: fadeIn 0.9s ease 1.15s both; }
    @keyframes wordRise {
      from { transform: translateY(110%); }
      to   { transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }

    /* ────────────────────────────────────────────
       GRID — Instagram-style 4:5 cards
    ──────────────────────────────────────────── */
    .vault {
      padding: 24px var(--pad-x) 120px;
      max-width: var(--max-w); margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      background: var(--border-dark);
    }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 440px)  { .grid { grid-template-columns: 1fr; } }

    .card {
      position: relative;
      aspect-ratio: 4 / 5;
      background: var(--dark-2);
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(28px) scale(0.985);
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card.in {
      opacity: 1; transform: none;
    }
    .card video, .card img.thumb {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                  filter 0.5s ease;
      filter: saturate(0.95);
    }
    .card:hover video, .card:hover img.thumb {
      transform: scale(1.06);
      filter: saturate(1.05);
    }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top,
        rgba(0,0,0,0.78) 0%,
        rgba(0,0,0,0.15) 45%,
        rgba(0,0,0,0) 75%);
      opacity: 0; transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .card:hover .card-overlay { opacity: 1; }

    .card-meta {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 16px 18px;
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 12px;
      transform: translateY(8px);
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }
    .card:hover .card-meta { opacity: 1; transform: none; }
    .card-title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1.05;
    }
    .card-sub {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--orange);
      margin-top: 6px;
    }
    .card-type {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px 8px;
      flex-shrink: 0;
    }

    .card-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.4);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), background 0.25s ease;
      pointer-events: none;
    }
    .card:hover .card-play {
      opacity: 1; transform: translate(-50%, -50%) scale(1);
      background: var(--orange);
      border-color: var(--orange);
    }

    .card.filter-hidden {
      display: none;
    }

    /* ────────────────────────────────────────────
       (review feature removed)
    ──────────────────────────────────────────── */
    /* ────────────────────────────────────────────
       YouTube play indicator on grid card
    ──────────────────────────────────────────── */
    .card-youtube-badge {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px;
      pointer-events: none;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card:hover .card-youtube-badge {
      background: var(--orange);
      border-color: var(--orange);
      transform: translate(-50%, -50%) scale(1.08);
    }

    /* ────────────────────────────────────────────
       MODAL — fullscreen player
    ──────────────────────────────────────────── */
    #modal {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
      padding: 24px;
    }
    #modal.open { opacity: 1; pointer-events: all; }

    .modal-box {
      position: relative;
      background: #000;
      border: 1px solid var(--border-dark);
      max-height: 92vh;
      max-width: 92vw;
      transform: scale(0.96) translateY(12px);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }
    #modal.open .modal-box { transform: none; }
    .modal-box video, .modal-box img {
      display: block;
      max-height: 92vh;
      max-width: 92vw;
      width: auto; height: auto;
    }
    /* YouTube Shorts — vertical 9:16 */
    .modal-box.portrait {
      height: min(88vh, 900px) !important;
      max-height: none !important;
      width: calc(min(88vh, 900px) * 9 / 16);
      max-width: 92vw;
      aspect-ratio: 9 / 16;
    }
    .modal-box.portrait iframe {
      width: 100%; height: 100%;
      border: none; display: block;
      background: #000;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px; z-index: 10;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border-dark);
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease;
    }
    .modal-close:hover {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .modal-caption {
      position: absolute; left: 20px; bottom: 18px;
      font-family: var(--font-display);
      font-size: 16px; font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow: 0 2px 14px rgba(0,0,0,0.7);
    }

    /* ────────────────────────────────────────────
       FOOTER
    ──────────────────────────────────────────── */
    footer {
      border-top: 2px solid var(--orange);
      padding: 56px var(--pad-x);
      text-align: center;
    }
    footer .foot-eyebrow {
      font-size: 9.5px; font-weight: 600;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 14px;
    }
    footer .foot-main {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    footer .foot-sub {
      font-size: 11px; color: var(--muted-dark);
      letter-spacing: 0.22em; text-transform: uppercase;
      margin-top: 14px;
    }
  </style>
</head>
<body>

  <!-- ─────────── GATE ─────────── -->
  <div id="gate">
    <div class="gate-glow"></div>
    <div class="gate-inner">
      <div class="gate-logo"><img class="js-logo" alt="Sa1nt" /></div>
      <h1 class="gate-title">Sa1nt</h1>
      <div class="gate-rule"></div>
      <form class="gate-form" id="gateForm" autocomplete="off">
        <input class="gate-input" id="gateInput" type="password" placeholder="ACCESS CODE" />
        <button class="gate-submit" type="submit">Enter</button>
      </form>
      <p class="gate-hint" id="gateHint" aria-hidden="true"></p>
    </div>
  </div>

  <!-- ─────────── NAV ─────────── -->
  <nav id="nav">
    <a class="nav-logo" href="#"><img class="js-logo" alt="Sa1nt" /></a>
  </nav>

  <!-- ─────────── HERO ─────────── -->
  <section class="hero">
    <h1 class="hero-title" id="heroTitle">
      <span class="word"><span>Harry</span></span>
      <br />
      <span class="word"><span>Sheezel</span></span>
      <br />
      <span class="word hero-x"><span>× Sa1nt</span></span>
    </h1>
  </section>

  <!-- ─────────── GRID ─────────── -->
  <section class="vault">
    <div class="grid" id="grid"></div>
  </section>

  <!-- ─────────── MODAL ─────────── -->
  <div id="modal" aria-hidden="true">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- ─────────── FOOTER ─────────── -->
  <footer></footer>

    document.querySelectorAll('img.js-logo').forEach(img => { img.src = LOGO_SRC; });

    /* ════════════════════════════════════════════
       CONFIG — edit these
    ════════════════════════════════════════════ */

    // CDN base — absolute path so images resolve correctly regardless of
    // trailing-slash behaviour in Next.js / Vercel routing
    const CDN_BASE = '/sa1nt/';

    // Access code
    const PASSKEY = 'Harry';

    // Media — type: 'photo' | 'video' | 'youtube'
    // Paths are RELATIVE (no leading slash) so this page works wherever it's mounted.
    const MEDIA = [
      { type: 'youtube', youtubeId: 'nwOaB5fm8ZY', thumb: 'media/youtube-thumb-01.jpg' },
      { type: 'photo', path: 'media/Kangaroos-x-Sa1nt-1.jpg' },
      { type: 'photo', path: 'media/Kangaroos-x-Sa1nt-2.jpg' },
      { type: 'photo', path: 'media/Kangaroos-x-Sa1nt-3.jpg' },
      { type: 'photo', path: 'media/Kangaroos-x-Sa1nt-4.jpg' },
      { type: 'photo', path: 'media/Kangaroos-x-Sa1nt-5.jpg' },
      { type: 'photo', path: 'media/Kangaroos-x-Sa1nt.jpg' },
    ];

    /* ════════════════════════════════════════════
       GATE
    ════════════════════════════════════════════ */
    const gate = document.getElementById('gate');
    const gateForm = document.getElementById('gateForm');
    const gateInput = document.getElementById('gateInput');
    const gateHint = document.getElementById('gateHint');

    function unlock() {
      gate.classList.add('hidden');
      document.body.classList.add('unlocked');
      setTimeout(() => { gate.style.display = 'none'; }, 900);
      try { sessionStorage.setItem('sa1nt_unlocked', '1'); } catch(e) {}
    }
    try {
      if (sessionStorage.getItem('sa1nt_unlocked') === '1') {
        gate.style.display = 'none';
        document.body.classList.add('unlocked');
      } else {
        gateInput.focus();
      }
    } catch(e) { gateInput.focus(); }

    gateForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (gateInput.value.trim().toLowerCase() === PASSKEY.toLowerCase()) {
        gateHint.textContent = 'Access granted';
        gateHint.style.color = 'var(--orange)';
        setTimeout(unlock, 350);
      } else {
        gateForm.classList.remove('shake');
        void gateForm.offsetWidth;
        gateForm.classList.add('shake');
        gateHint.textContent = 'Incorrect — try again';
        gateHint.style.color = '#c84a4a';
        gateInput.value = '';
      }
    });

    /* ════════════════════════════════════════════
       NAV scroll state
    ════════════════════════════════════════════ */
    const nav = document.getElementById('nav');
    window.addEventListener('scroll',
      () => nav.classList.toggle('scrolled', window.scrollY > 64),
      { passive: true }
    );

    /* ════════════════════════════════════════════
       GRID render
    ════════════════════════════════════════════ */
    const grid = document.getElementById('grid');

    function url(p) { return CDN_BASE + p; }

    MEDIA.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.type = item.type;
      card.dataset.index = i;
      card.style.transitionDelay = (0.05 * (i % 8)) + 's';

      if (item.type === 'video') {
        card.innerHTML = `
          <video muted playsinline preload="metadata"
                 ${item.poster ? `poster="${url(item.poster)}"` : ''}>
            <source src="${url(item.path)}#t=0.1" type="video/mp4" />
          </video>
        `;
        const v = card.querySelector('video');
        card.addEventListener('mouseenter', () => { v.play().catch(()=>{}); });
        card.addEventListener('mouseleave', () => { v.pause(); v.currentTime = 0; });
      } else if (item.type === 'youtube') {
        card.innerHTML = `
          <img class="thumb" loading="lazy" src="${url(item.thumb)}" alt="" />
          <div class="card-youtube-badge">▶</div>
        `;
      } else {
        card.innerHTML = `
          <img class="thumb" loading="lazy" src="${url(item.path)}" alt="" />
        `;
      }

      card.addEventListener('click', () => openModal(item));
      grid.appendChild(card);
    });

    /* ════════════════════════════════════════════
       Reveal on intersect
    ════════════════════════════════════════════ */
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.card').forEach(el => io.observe(el));

    /* ════════════════════════════════════════════
       Modal
    ════════════════════════════════════════════ */
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const modalClose = document.getElementById('modalClose');

    function openModal(item) {
      const modalBox = document.getElementById('modalBox');
      modalBox.classList.remove('portrait');
      if (item.type === 'video') {
        modalContent.innerHTML = `
          <video src="${url(item.path)}" controls autoplay playsinline
                 ${item.poster ? `poster="${url(item.poster)}"` : ''}></video>
        `;
      } else if (item.type === 'youtube') {
        modalBox.classList.add('portrait');
        modalContent.innerHTML = `
          <iframe src="https://www.youtube.com/embed/${item.youtubeId}?autoplay=1&playsinline=1&rel=0&modestbranding=1"
                  allow="autoplay; encrypted-media; picture-in-picture; web-share"
                  allowfullscreen></iframe>
        `;
      } else {
        modalContent.innerHTML = `<img src="${url(item.path)}" alt="" />`;
      }
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { modalContent.innerHTML = ''; }, 400);
    }
    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
